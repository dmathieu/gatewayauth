name: Test
on: [push, pull_request]
jobs:
  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go: [stable, oldstable]
    steps:
    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: ${{ matrix.go }}
    - name: Clone repository
      uses: actions/checkout@v6
    - name: Test
      run: make test
